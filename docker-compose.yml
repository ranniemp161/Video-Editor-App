version: '3.8'

services:
  # Backend API service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: video-editor-backend:latest
    container_name: video-editor-backend
    ports:
      - "8000:8000"
    volumes:
      # Mount source code for hot-reloading
      - ./backend:/app
      # Persist data and uploads on host
      - ./backend/data:/app/data
      - ./backend/public/uploads:/app/public/uploads
    environment:
      - PORT=8000
      - PYTHONUNBUFFERED=1
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_PASSWORD=${APP_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - MAX_UPLOAD_SIZE_MB=${MAX_UPLOAD_SIZE_MB:-500}
    restart: unless-stopped
    networks:
      - video-editor-network

  # Frontend dev server
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: video-editor-frontend:latest
    container_name: video-editor-frontend
    ports:
      - "3000:5173"
    env_file:
      - .env
    volumes:
      # Mount source code for hot-reloading
      - ./src:/app/src
      - ./public:/app/public
      - ./server:/app/server
      - ./index.html:/app/index.html
      - ./.env:/app/.env
      - ./vite.config.ts:/app/vite.config.ts
      - ./tailwind.config.js:/app/tailwind.config.js
      - ./tsconfig.json:/app/tsconfig.json
    environment:
      # BACKEND_URL is used by the Vite dev-server proxy (server-side).
      # The browser itself uses relative /api paths, which Vite forwards here.
      # This uses Docker's internal network to resolve the backend service by name.
      - BACKEND_URL=http://backend:8000
      # DO NOT set VITE_API_URL here — if set, it overrides the proxy and the
      # browser tries to hit the backend directly, causing CORS issues in Docker.
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - video-editor-network

networks:
  video-editor-network:
    driver: bridge
